<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function draw(id,s){
  const c=document.getElementById(id).getContext('2d');
  c.fillStyle='#6366f1';c.beginPath();c.roundRect(0,0,s,s,s*0.18);c.fill();
  c.fillStyle='#fff';c.font=`bold ${s*0.45}px sans-serif`;c.textAlign='center';c.textBaseline='middle';
  c.fillText('M',s/2,s*0.52);
  // download
  c.canvas.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`icon-${s}.png`;a.click()});
}
draw('c192',192);draw('c512',512);
</script>
